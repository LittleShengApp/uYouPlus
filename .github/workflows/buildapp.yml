# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/CercubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouPlus

on:
  workflow_dispatch:
    inputs:
      uyou_version:
        description: "The version of uYou"
        default: "3.0.4"
        required: true
        type: string
      uyou_url:
        description: "The URL for download uYou"
        default: "https://something.url/uyou.deb"
        required: false
        type: string
      decrypted_youtube_url:
        description: "Direct URL to the decrypted YouTube ipa. The version of YouTube will be detected automatically."
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID. Not recommended"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the name of the app on the Home Screen. Not recommended"
        default: "YouTube"
        required: true
        type: string
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean
      upload_artifact:
        description: "Upload Artifact"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouPlus
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4.2.1
        with:
          path: main
          submodules: recursive

      - name: Caching brew dependencies
        id: brew_cache
        uses: tecolicom/actions-use-homebrew-tools@v1.2
        with:
          tools: ldid dpkg make
          cache: yes

      - name: Install Dependencies
        if: steps.brew_cache.outputs.cache-hit != 'true'
        run: brew install ldid dpkg make

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v4.2.1
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Caching SDK
        id: SDK
        uses: actions/cache@v4
        env:
          cache-name: iOS-16.5-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}

      - name: Download iOS 16.5 SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks.git && cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@v4.2.1
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Prepare YouTube iPA
        id: prepare_youtube
        run: |
          wget "$YOUTUBE_URL" --no-verbose -O main/YouTube.ipa
          cd ${{ github.workspace }}/main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "==> YouTube v$youtube_version downloaded!"
          sed -i '' "17s#.*#YOUTUBE_VERSION = ${youtube_version}#g" Makefile
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT

        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ inputs.decrypted_youtube_url }}

      - name: Download Missing Headers
        run: |
          cd ${{ github.workspace }}/main
          mkdir -p headers
          
          # 下載 YouTubeHeader
          git clone --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          mv YouTubeHeader headers/YouTubeHeader
          
          # 下載 PSHeader
          git clone --depth=1 https://github.com/PoomSmart/PSHeader.git
          mv PSHeader headers/PSHeader

      - name: Fix compiling & Build Package
        id: build_package
        run: |
          mkdir -p theos/lib/iphone/rootless
          cd ${{ github.workspace }}/main
          sed -i '' "27s#.*#BUNDLE_ID = ${{ env.BUNDLE_ID }}#g" Makefile
          sed -i '' "26s#.*#DISPLAY_NAME = ${{ env.APP_NAME }}#g" Makefile
          
          # 1. 移除嚴格警告中斷
          find . -type f \( -name "Makefile" -o -name "*.mk" \) -exec sed -i '' 's/-Werror//g' {} +
          
          # 2. 自動打補丁：修復 Return-YouTube-Dislikes 模組
          find Tweaks/Return-YouTube-Dislikes -type f \( -name "*.x" -o -name "*.xm" -o -name "*.m" \) -exec sh -c 'printf "#import <Foundation/Foundation.h>\n#include <assert.h>\n" | cat - "$1" > "$1.tmp" && mv "$1.tmp" "$1"' _ {} \;
          
          # 3. 自動打補丁：修復 YouPiP 模組
          find Tweaks/YouPiP -name "LegacyPiPCompat.x" -exec sed -i '' -E 's/return initPlayerPiPControllerIfNeeded\((%orig.*)\);/id temp = \1; return initPlayerPiPControllerIfNeeded(temp);/g' {} +
          
          # 4. 自動打補丁：修復 YTVideoOverlay 模組
          find Tweaks/YTVideoOverlay -name "Tweak.x" -exec sed -i '' -E 's/return topControls\(self, (%orig.*)\);/id temp = \1; return topControls(self, temp);/g' {} +
          
          # 5. 自動打補丁：修復 YouTube-X 模組
          find Tweaks/YouTube-X -name "Tweak.x" -exec perl -pi -e 's/.*decorateContext.*%orig\(nil\).*/- (void)decorateContext:(id)context {\n    context = nil;\n    %orig;\n}/' {} +

          # 6. 自動打補丁：修復 uYouPlus 主程式第 166 行
          sed -i '' 's/return IS_ENABLED(kHideCC) ? %orig(NO) : %orig;/BOOL cc = arg1; if(IS_ENABLED(kHideCC)) cc = NO; return %orig(cc);/g' Sources/uYouPlus.xm
          
          # 7. 自動打補丁：修復 uYouPlus 主程式第 300 行 (%orig(0) 錯誤)
          sed -i '' 's/- (void)setFeedHeaderScrollMode:(int)arg1 { %orig(0); }/- (void)setFeedHeaderScrollMode:(int)arg1 { arg1 = 0; %orig; }/g' Sources/uYouPlus.xm
          
          # 8. 自動打補丁：修復 uYouPlus 主題設定第 129 行
          sed -i '' 's/return IS_DARK_APPEARANCE_ENABLED ? %orig(\[UIColor blackColor\]) : %orig;/if(IS_DARK_APPEARANCE_ENABLED) color = \[UIColor blackColor\]; return %orig(color);/g' Sources/uYouPlusThemes.xm

          # 9. 自動打補丁：修復 uYouPlus 主題設定第 212 與 218 行
          sed -i '' 's/return IS_DARK_APPEARANCE_ENABLED ? %orig(raisedColor) : %orig;/if(IS_DARK_APPEARANCE_ENABLED) color = raisedColor; return %orig(color);/g' Sources/uYouPlusThemes.xm
          
          # 10. 自動打補丁：修復 uYouPlus 主題設定第 277 行 (%orig(NO) 錯誤)
          sed -i '' 's/- (void)setLightKeyboard:(BOOL)arg1 { %orig(NO); }/- (void)setLightKeyboard:(BOOL)arg1 { arg1 = NO; %orig; }/g' Sources/uYouPlusThemes.xm

          # 11. 開啟寬容模式並進行編譯
          export GO_EASY_ON_ME=1
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1 ADDITIONAL_CFLAGS="-Wno-error -Wno-incompatible-pointer-types -I$(pwd)/headers"
          
          echo "package=$(ls -t packages | head -n1)" >>$GITHUB_OUTPUT
          echo -e "==> \033[1mSHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')\033[0m"
          echo -e "==> \033[1mBundle ID: ${{ env.BUNDLE_ID }}\033[0m"

        env:
          THEOS: ${{ github.workspace }}/theos
          UYOU_VERSION: ${{ inputs.uyou_version }}
          UYOU_URL: ${{ inputs.uyou_url }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4.4.3
        env:
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          name: uYouPlus_${{ env.YOUTUBE_VERSION }}_${{ env.UYOU_VERSION }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        id: create_release
        uses: qnblackcat/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
          DRAFT: ${{ inputs.create_release }}
        with:
          tag_name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          files: main/packages/*.ipa
          draft: ${{ env.DRAFT }}
